<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Sewer Taipan icon: pipe with coin -->
  <rect width="128" height="128" rx="16" fill="#1a1a2e"/>
  <!-- Sewer pipe -->
  <rect x="10" y="50" width="108" height="28" rx="6" fill="#4a7c59"/>
  <rect x="10" y="50" width="108" height="8" rx="3" fill="#5a9c69"/>
  <!-- Bolts -->
  <circle cx="25" cy="64" r="5" fill="#8b7355"/>
  <circle cx="103" cy="64" r="5" fill="#8b7355"/>
  <!-- Drip -->
  <ellipse cx="64" cy="92" rx="5" ry="8" fill="#2e8b57" opacity="0.7"/>
  <!-- Coin -->
  <circle cx="64" cy="38" r="16" fill="#ffd700"/>
  <circle cx="64" cy="38" r="12" fill="#ffec5c"/>
  <text x="64" y="43" text-anchor="middle" font-size="14" font-weight="bold" fill="#b8860b">$</text>
</svg>
